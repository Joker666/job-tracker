<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Tracker Companion</title>
  <style>
    /* Neo-Brutalist CSS System */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background-color: #f4f3ef;
      color: #000000;
      padding: 16px;
      border: 3px solid #000000;
    }

    h1 {
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 3px solid #000000;
      background-color: #FFDE4D;
      padding: 8px;
      margin-bottom: 16px;
      text-align: center;
      box-shadow: 3px 3px 0px 0px rgba(0,0,0,1);
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: #000000;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 11px;
      font-weight: bold;
      background-color: #ffffff;
      border: 2px solid #000000;
      border-radius: 0;
      outline: none;
    }

    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      background-color: #fffbeb;
      border-color: #000000;
    }

    textarea {
      resize: vertical;
      height: 70px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* Details styling for expandable Settings */
    details {
      border: 2px solid #000000;
      background-color: #ffffff;
      margin-bottom: 16px;
      padding: 6px;
    }

    summary {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      user-select: none;
    }

    .settings-content {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 2px dashed #000000;
    }

    .btn-submit,
    .btn-secondary {
      display: block;
      width: 100%;
      height: 40px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      color: #000000;
      border: 3px solid #000000;
      cursor: pointer;
      box-shadow: 3px 3px 0px 0px rgba(0,0,0,1);
      transition: all 0.1s ease;
    }

    .btn-submit {
      background-color: #4ADE80;
    }

    .btn-secondary {
      background-color: #38BDF8;
      margin-top: 10px;
    }

    .btn-submit:hover,
    .btn-secondary:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
    }

    .btn-submit:active,
    .btn-secondary:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0px 0px rgba(0,0,0,1);
    }

    /* Status Notifications */
    .status-msg {
      display: none;
      margin-top: 12px;
      padding: 8px;
      font-size: 10px;
      font-weight: bold;
      border: 2px solid #000000;
      box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
    }

    .status-success {
      background-color: #4ADE80;
    }

    .status-error {
      background-color: #FB7185;
    }
  </style>
</head>
<body>
  <h1>Job Clipper</h1>

  <form id="jobForm">
    <div class="form-group">
      <label for="title">Job Title *</label>
      <input type="text" id="title" required placeholder="Software Engineer">
    </div>

    <div class="form-group">
      <label for="companyName">Company *</label>
      <input type="text" id="companyName" required placeholder="Google DeepMind">
    </div>

    <div class="row">
      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" placeholder="New York, NY (Hybrid)">
      </div>
      <div class="form-group">
        <label for="salaryRange">Salary Range</label>
        <input type="text" id="salaryRange" placeholder="CA$167K - CA$242K">
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="status">Initial Status</label>
        <select id="status">
          <option value="SAVED" selected>Saved</option>
          <option value="APPLIED">Applied</option>
          <option value="INTERVIEWING">Interviewing</option>
          <option value="OFFER">Offer</option>
          <option value="REJECTED">Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label for="jobUrl">Job URL</label>
        <input type="text" id="jobUrl" placeholder="https://...">
      </div>
    </div>

    <div class="form-group">
      <label for="description">Snippet / Description</label>
      <textarea id="description" placeholder="Paste key responsibilities or descriptions here..."></textarea>
    </div>

    <details id="settingsDetails">
      <summary>Settings & Connection</summary>
      <div class="settings-content">
        <div class="form-group">
          <label for="hostUrl">Tracker Host URL</label>
          <input type="text" id="hostUrl" placeholder="http://localhost:3000">
        </div>
        <div class="form-group">
          <label for="apiToken">API Access Token</label>
          <input type="text" id="apiToken" placeholder="Enter API Token">
        </div>
      </div>
    </details>

    <button type="submit" class="btn-submit">Clip Application</button>
    <button type="button" id="btnCopyPrompt" class="btn-secondary">📋 Copy AI Prompt</button>
  </form>

  <div id="statusBox" class="status-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
